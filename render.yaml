services:
  - type: web
    name: your-app-name  # Change this to your app's name
    runtime: python
    buildCommand: |
      export CARGO_HOME=/opt/render/project/.cargo
      export CARGO_TARGET_DIR=/opt/render/project/target
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app  # Change 'app:app' to your Flask app's entry point
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0